[package]
name = "ato-passive-observer"
version = "0.1.0"
edition = "2021"
description = "Shared tail-watcher for Claude Code / Codex / Gemini CLI session JSONLs. Persists user-prompt + assistant-response pairs into the ATO execution_logs table as dispatch_kind='passive_observation'. Powers both the desktop auto-start and `ato observe` CLI."
license = "MIT"

[dependencies]
notify = "6"
# rusqlite is pinned at 0.31 — matches the desktop crate. A workspace
# can only link to one libsqlite3-sys at a time (the `links = "sqlite3"`
# manifest key enforces this). If this crate jumps to 0.32 while the
# desktop stays on 0.31, every CLI/desktop build that pulls both
# crates fails to link. Per review (gemini HIGH on the v2.13 review):
# the right move is bumping both consumers to 0.32 in a follow-up PR
# focused on the bump itself — too much regression surface to mix
# into the observability sprint.
rusqlite = { version = "0.31", features = ["bundled"] }
serde_json = "1"
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
dirs = "5"
ato-pricing = { path = "../ato-pricing" }

[dev-dependencies]
tempfile = "3"

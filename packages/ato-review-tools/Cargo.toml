[package]
name = "ato-review-tools"
version = "0.1.0"
edition = "2021"
description = "Shared executor for ATO review tools (read_file, grep, git_log). Sandbox-enforced; used by ato-cli + ato-desktop for the tool-call loop on API-provider dispatches."
license = "MIT"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"

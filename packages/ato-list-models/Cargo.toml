[package]
name = "ato-list-models"
version = "0.1.0"
edition = "2021"
description = "Live model discovery for ATO's 8 API providers. Built v2.15.0 Slice C per war_room 0D398F74 (codex: 'keep registry pure; add a new shared crate for provider model discovery plus normalization'). Caches in-memory per (provider, key_fingerprint) for 10 minutes."
license = "MIT"

[dependencies]
ato-api-providers = { path = "../ato-api-providers" }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros"] }

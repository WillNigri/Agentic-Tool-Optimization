name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build core packages
        run: |
          npm run build -w packages/core
          npm run build -w packages/db

      - name: Build MCP server
        run: npm run build -w services/mcp-server

      - name: Build desktop frontend (includes type checking)
        working-directory: apps/desktop
        run: npx vite build

  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev

      # The desktop's tauri.conf.json declares the `ato` CLI as a
      # sidecar via `"externalBin": ["binaries/ato"]`, so cargo check
      # on the desktop fails until that binary exists on disk.
      # Pre-build the CLI and stage it at the expected sidecar path
      # before checking the desktop crate.
      - name: Build ato CLI for Tauri sidecar
        working-directory: apps/cli
        run: |
          cargo build --release
          mkdir -p ../desktop/src-tauri/binaries
          cp target/release/ato ../desktop/src-tauri/binaries/ato-x86_64-unknown-linux-gnu

      - name: Check Rust
        working-directory: apps/desktop/src-tauri
        run: cargo check

      - name: Run Rust tests
        working-directory: apps/desktop/src-tauri
        run: cargo test --lib

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        working-directory: apps/desktop
        run: npx vitest run

      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npx vite build

name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      tag: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        id: create
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ATO ${{ github.ref_name }}
          body: |
            ## ATO (Agentic Tool Optimization) ${{ github.ref_name }}

            The control panel for AI coding tools.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `ATO_*_aarch64.dmg` |
            | macOS (Intel) | `ATO_*_x64.dmg` |
            | Windows | `ATO_*_x64-setup.exe` |
            | Linux (AppImage) | `ATO_*_amd64.AppImage` |
            | Linux (deb) | `ATO_*_amd64.deb` |

            ### What's included
            - Desktop app with offline-first SQLite storage
            - Context visualizer, skills manager, usage analytics, MCP dashboard
            - MCP server for Claude Code integration
            - i18n: English, Portuguese, Spanish

            ### Install MCP Server (no desktop app needed)
            ```bash
            npx ato-mcp
            ```
          draft: false
          prerelease: false

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install dependencies
        run: npm install

      - name: Build core packages
        run: |
          npm run build -w packages/core
          npm run build -w packages/db

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  publish-mcp:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: |
          npm run build -w packages/core
          npm run build -w services/mcp-server

      - name: Publish MCP server to npm
        if: env.NPM_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd services/mcp-server
          npm publish --access public || echo "Publish skipped (may already exist)"

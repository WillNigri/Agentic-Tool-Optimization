name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install dependencies
        run: npm install
        working-directory: apps/desktop

      - name: Build Tauri app
        # Pinned to a recent version — @v0 floats to whatever's "latest"
        # which has produced the "Signature not found for the updater
        # JSON. Skipping upload..." regression on v1.5.0–1.5.4 even with
        # a valid no-password signing key. v0.5.x has the bundle/.sig
        # rename fix.
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: |
            ## ATO ${{ github.ref_name }}

            Multi-LLM control panel for Claude Code, Codex, OpenClaw, and Hermes.

            Download the installer for your platform below.
          releaseDraft: false
          prerelease: false
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

      # tauri-action's `includeUpdaterJson` upload logic has had a long-running
      # regression on matrix builds (v1.5.0–1.5.7 all reproduced "Signature
      # not found for the updater JSON. Skipping upload..."). The `.sig` files
      # ARE created by Tauri's bundler but never make it onto the release.
      # Workaround: explicitly upload every `.sig` and the `.nsis.zip` /
      # `.AppImage.tar.gz` updater bundles ourselves. The aggregator job
      # below then constructs `latest.json` from these.
      #
      # PowerShell on Windows + bash on Unix — bash on Windows runners
      # mangled the path globs in v1.5.6.
      - name: Upload updater artifacts (Unix)
        if: success() && matrix.platform != 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          BUNDLE_ROOT="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ ! -d "$BUNDLE_ROOT" ]; then
            echo "::warning::Bundle dir $BUNDLE_ROOT not found, skipping"
            exit 0
          fi
          echo "Bundle dir contents:"
          find "$BUNDLE_ROOT" -maxdepth 4 -type f \( -name "*.sig" -o -name "*.tar.gz" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" \) 2>&1 | head -30
          echo "---"
          # Two separate finds so the OR logic doesn't depend on parenthesis
          # escaping inside YAML→bash. v1.5.5–v1.5.8 used `\( -name X -o -name Y \)`
          # which silently produced zero results in some shell environments.
          UPLOADED=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Uploading $f"
            if gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber; then
              UPLOADED=$((UPLOADED+1))
            else
              echo "::warning::upload failed for $f"
            fi
          done < <(find "$BUNDLE_ROOT" -type f -name "*.sig"; find "$BUNDLE_ROOT" -type f -name "*.AppImage.tar.gz")
          echo "Uploaded $UPLOADED updater artifacts"
          if [ "$UPLOADED" -eq 0 ]; then
            echo "::warning::No updater artifacts found under $BUNDLE_ROOT — auto-update will be broken for this platform."
          fi

      - name: Upload updater artifacts (Windows)
        if: success() && matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          $bundleRoot = "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          if (-not (Test-Path $bundleRoot)) {
            Write-Warning "Bundle dir $bundleRoot not found, skipping"
            exit 0
          }
          Write-Host "Bundle dir contents:"
          Get-ChildItem -Path $bundleRoot -Recurse -File | Where-Object { $_.Name -match '\.(sig|tar\.gz|nsis\.zip|exe|msi)$' } | ForEach-Object { Write-Host $_.FullName }
          Write-Host "---"
          $uploaded = 0
          Get-ChildItem -Path $bundleRoot -Recurse -File -Include *.sig, *.nsis.zip | ForEach-Object {
            Write-Host "Uploading $($_.FullName)"
            gh release upload $env:TAG $_.FullName --repo "${{ github.repository }}" --clobber
            if ($LASTEXITCODE -eq 0) { $uploaded++ } else { Write-Warning "upload failed for $($_.FullName)" }
          }
          Write-Host "Uploaded $uploaded updater artifacts"
          if ($uploaded -eq 0) {
            Write-Warning "No updater artifacts found under $bundleRoot — auto-update will be broken for this platform."
          }

  # Aggregator job: pull all .sig files from the release after the matrix
  # finishes, construct latest.json, upload it. Replaces tauri-action's
  # broken updater-json generation step.
  generate-updater-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Build + upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -e
          VERSION="${TAG#v}"
          mkdir -p sigs
          # `gh release download/upload` requires a repo reference; without
          # actions/checkout this job has no .git so we must pass --repo
          # explicitly. Previous runs failed with "fatal: not a git
          # repository".
          gh release download "$TAG" --repo "${{ github.repository }}" -p "*.sig" -D sigs/ --clobber || true
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Read signatures via Python so embedded special characters
          # don't break shell quoting. Missing platforms are silently
          # omitted from the manifest rather than crashing the JSON.
          export VERSION TAG PUB_DATE BASE_URL
          python3 - <<'PY' > latest.json
          import glob, json, os
          version = os.environ["VERSION"]
          base = os.environ["BASE_URL"]
          pub_date = os.environ["PUB_DATE"]

          def read_first(*patterns):
              for pat in patterns:
                  matches = glob.glob(f"sigs/{pat}")
                  if matches:
                      with open(matches[0]) as f:
                          return f.read().strip()
              return None

          # macOS Apple Silicon
          aarch64_sig = read_first("*aarch64*.app.tar.gz.sig", "ATO.app.tar.gz.sig")
          # macOS Intel (x86_64). Tauri may emit the same generic name
          # on both runners — fall back if no arch-tagged file.
          x64_sig = read_first("*x64*.app.tar.gz.sig", "*x86_64*.app.tar.gz.sig", "ATO.app.tar.gz.sig")
          linux_sig = read_first("*AppImage.tar.gz.sig", "*.AppImage.sig")
          win_sig = read_first("*nsis.zip.sig", "*msi.zip.sig")

          platforms = {}
          def add(key, sig, url):
              if sig:
                  platforms[key] = {"signature": sig, "url": url}

          add("darwin-aarch64", aarch64_sig, f"{base}/ATO_aarch64.app.tar.gz")
          add("darwin-x86_64",  x64_sig,     f"{base}/ATO_x64.app.tar.gz")
          add("linux-x86_64",   linux_sig,   f"{base}/ATO_{version}_amd64.AppImage.tar.gz")
          add("windows-x86_64", win_sig,     f"{base}/ATO_{version}_x64-setup.nsis.zip")

          print(json.dumps({
              "version": version,
              "notes": f"ATO {version}",
              "pub_date": pub_date,
              "platforms": platforms,
          }, indent=2))
          PY
          cat latest.json
          gh release upload "$TAG" latest.json --repo "${{ github.repository }}" --clobber

  # The cask repo lives at WillNigri/homebrew-ato, so the default GITHUB_TOKEN
  # (scoped to this repo) can't push there. Set HOMEBREW_TAP_TOKEN to a PAT
  # with `repo` scope on the tap repo to enable this step. Without that
  # secret the step is allowed to fail without breaking the release —
  # binaries + latest.json upload still succeed.
  update-homebrew:
    needs: build
    runs-on: macos-latest
    continue-on-error: true
    if: ${{ vars.PUBLISH_HOMEBREW != 'false' }}
    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Get SHA256 checksums
        id: sha
        env:
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          ARM_URL="https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/${TAG}/ATO_${VERSION}_aarch64.dmg"
          X64_URL="https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/${TAG}/ATO_${VERSION}_x64.dmg"
          echo "arm_sha=$(curl -sL "$ARM_URL" | shasum -a 256 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64_sha=$(curl -sL "$X64_URL" | shasum -a 256 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask
        env:
          # Use the tap PAT when present; fall back to the in-repo token (which
          # will fail with 403 against the tap, but that's caught below).
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ github.ref_name }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          X64_SHA: ${{ steps.sha.outputs.x64_sha }}
        run: |
          if ! git clone https://x-access-token:${GH_TOKEN}@github.com/WillNigri/homebrew-ato.git /tmp/homebrew-ato 2>/dev/null; then
            echo "::warning::Cannot push to homebrew-ato. Set HOMEBREW_TAP_TOKEN secret (PAT with repo scope) to enable cask updates."
            exit 0
          fi
          cat > /tmp/homebrew-ato/Casks/ato.rb << 'CASK'
          cask "ato" do
            version "VERSION_PLACEHOLDER"

            on_arm do
              sha256 "ARM_SHA_PLACEHOLDER"
              url "https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/TAG_PLACEHOLDER/ATO_#{version}_aarch64.dmg"
            end

            on_intel do
              sha256 "X64_SHA_PLACEHOLDER"
              url "https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/TAG_PLACEHOLDER/ATO_#{version}_x64.dmg"
            end

            name "ATO"
            desc "Control panel for AI coding tools — manage skills, agents, and LLM configurations"
            homepage "https://agentictool.ai"

            app "ATO.app"

            zap trash: [
              "~/.ato",
              "~/Library/Application Support/ai.agenticsearchoptimization.ato",
              "~/Library/Caches/ai.agenticsearchoptimization.ato",
            ]
          end
          CASK
          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/g" /tmp/homebrew-ato/Casks/ato.rb
          sed -i '' "s/TAG_PLACEHOLDER/${TAG}/g" /tmp/homebrew-ato/Casks/ato.rb
          sed -i '' "s/ARM_SHA_PLACEHOLDER/${ARM_SHA}/g" /tmp/homebrew-ato/Casks/ato.rb
          sed -i '' "s/X64_SHA_PLACEHOLDER/${X64_SHA}/g" /tmp/homebrew-ato/Casks/ato.rb
          cd /tmp/homebrew-ato
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ato.rb
          git commit -m "chore: bump ATO to ${TAG}"
          git push

name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install dependencies
        run: npm install
        working-directory: apps/desktop

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: |
            ## ATO ${{ github.ref_name }}

            Multi-LLM control panel for Claude Code, Codex, OpenClaw, and Hermes.

            Download the installer for your platform below.
          releaseDraft: false
          prerelease: false
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

  update-homebrew:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Get SHA256 checksums
        id: sha
        env:
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          ARM_URL="https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/${TAG}/ATO_${VERSION}_aarch64.dmg"
          X64_URL="https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/${TAG}/ATO_${VERSION}_x64.dmg"
          echo "arm_sha=$(curl -sL "$ARM_URL" | shasum -a 256 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64_sha=$(curl -sL "$X64_URL" | shasum -a 256 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ github.ref_name }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          X64_SHA: ${{ steps.sha.outputs.x64_sha }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/WillNigri/homebrew-ato.git /tmp/homebrew-ato
          cat > /tmp/homebrew-ato/Casks/ato.rb << 'CASK'
          cask "ato" do
            version "VERSION_PLACEHOLDER"

            on_arm do
              sha256 "ARM_SHA_PLACEHOLDER"
              url "https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/TAG_PLACEHOLDER/ATO_#{version}_aarch64.dmg"
            end

            on_intel do
              sha256 "X64_SHA_PLACEHOLDER"
              url "https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/TAG_PLACEHOLDER/ATO_#{version}_x64.dmg"
            end

            name "ATO"
            desc "Control panel for AI coding tools — manage skills, agents, and LLM configurations"
            homepage "https://agentictool.ai"

            app "ATO.app"

            zap trash: [
              "~/.ato",
              "~/Library/Application Support/ai.agenticsearchoptimization.ato",
              "~/Library/Caches/ai.agenticsearchoptimization.ato",
            ]
          end
          CASK
          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/g" /tmp/homebrew-ato/Casks/ato.rb
          sed -i '' "s/TAG_PLACEHOLDER/${TAG}/g" /tmp/homebrew-ato/Casks/ato.rb
          sed -i '' "s/ARM_SHA_PLACEHOLDER/${ARM_SHA}/g" /tmp/homebrew-ato/Casks/ato.rb
          sed -i '' "s/X64_SHA_PLACEHOLDER/${X64_SHA}/g" /tmp/homebrew-ato/Casks/ato.rb
          cd /tmp/homebrew-ato
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ato.rb
          git commit -m "chore: bump ATO to ${TAG}"
          git push

name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Pre-create the GitHub release shell so the matrix jobs can upload
  # to it concurrently via `gh release upload --clobber`. Done in a
  # dedicated job so we don't race four matrix jobs on `gh release
  # create` simultaneously.
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}
    steps:
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving as-is"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TAG" \
              --notes "## ATO $TAG

          Multi-runtime AI agentic workspace. Local-first, MIT-licensed.

          Download the installer for your platform below."
          fi

  build:
    needs: prepare-release
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install dependencies
        run: npm install
        working-directory: apps/desktop

      - name: Build Tauri app
        # IMPORTANT: no `tagName` / `releaseName` / `releaseBody` — without
        # these, tauri-action runs `tauri build` only and skips its
        # release-upload phase entirely (which is what we want, because
        # that phase has the broken `.sig` cleanup we hit on v1.5.6–v1.5.13).
        #
        # The catch: tauri-action's release-upload phase is ALSO where it
        # signs the updater bundles. Without it, no .sig files are ever
        # produced. We do the signing ourselves in the next step.
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}

      # Sign updater bundles ourselves using `tauri signer sign`. The bundler
      # produces the .app.tar.gz / .AppImage.tar.gz / .nsis.zip files, but
      # without tauri-action's release-upload pass these never get signed.
      # `tauri signer sign` is the same tool tauri-action uses internally —
      # it writes a minisign-compatible `.sig` file next to each input.
      # Package + sign updater bundles ourselves. Without `tagName` on
      # tauri-action, its release-upload helpers don't run on Linux/Windows
      # (verified in v1.5.17 logs: "No releaseId or tagName provided,
      # skipping all uploads..." — and on Linux/Windows the .AppImage.tar.gz
      # / .nsis.zip packaging lives inside that skipped block). On macOS the
      # helper does still tar `.app/` → `.app.tar.gz` independently, so only
      # signing is needed there.
      - name: Package + sign updater bundles (Unix)
        if: success() && matrix.platform != 'windows-latest'
        shell: bash
        env:
          # `tauri signer sign` auto-reads these env vars; passing
          # --private-key explicitly conflicts with the env-derived value.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: apps/desktop
        run: |
          set -e
          BUNDLE_ROOT="src-tauri/target/${{ matrix.target }}/release/bundle"

          # On macOS, tauri-action tars `.app/` into `ATO.app.tar.gz` with no
          # architecture suffix. Both Apple Silicon and Intel jobs produce
          # the same filename, so the second one to upload silently
          # overwrites the first's binary AND its signature (--clobber).
          # latest.json's per-arch URLs (ATO_aarch64.app.tar.gz /
          # ATO_x64.app.tar.gz) then point at non-existent files.
          # Rename per-arch before signing so each arch ends up with its own
          # unique filename in the release.
          if [ "$RUNNER_OS" = "macOS" ]; then
            case "${{ matrix.target }}" in
              aarch64-apple-darwin) ARCH=aarch64 ;;
              x86_64-apple-darwin)  ARCH=x64 ;;
              *) echo "::error::unknown macOS target ${{ matrix.target }}"; exit 1 ;;
            esac
            for f in "$BUNDLE_ROOT/macos/ATO.app.tar.gz" "$BUNDLE_ROOT/macos/ATO.app.tar.gz.sig"; do
              if [ -f "$f" ]; then
                newname="$(dirname "$f")/ATO_${ARCH}.app.tar.gz$(echo "$f" | grep -oE '\.sig$' || true)"
                echo "Renaming $f -> $newname"
                mv "$f" "$newname"
              fi
            done
          fi

          # On Linux, tar each .AppImage into .AppImage.tar.gz so the updater
          # has a deterministic archive to sign. macOS already has .app.tar.gz
          # from tauri-action's helper.
          if [ "$RUNNER_OS" = "Linux" ]; then
            while IFS= read -r app; do
              [ -z "$app" ] && continue
              dest="${app}.tar.gz"
              if [ ! -f "$dest" ]; then
                echo "Packaging $app -> $dest"
                tar czf "$dest" -C "$(dirname "$app")" "$(basename "$app")"
              fi
            done < <(find "$BUNDLE_ROOT" -type f -name "*.AppImage" -not -name "*.tar.gz" 2>/dev/null)
          fi

          SIGNED=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Signing $f"
            npx tauri signer sign "$f"
            SIGNED=$((SIGNED+1))
          done < <(find "$BUNDLE_ROOT" -type f \( -name "*.app.tar.gz" -o -name "*.AppImage.tar.gz" \) 2>/dev/null)
          echo "Signed $SIGNED bundles"
          if [ "$SIGNED" -eq 0 ]; then
            echo "::error::No updater bundles found to sign under $BUNDLE_ROOT"
            find "$BUNDLE_ROOT" -type f | head -20
            exit 1
          fi

      - name: Package + sign updater bundles (Windows)
        if: success() && matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: apps/desktop
        run: |
          $bundleRoot = "src-tauri/target/${{ matrix.target }}/release/bundle"

          # Zip each NSIS *-setup.exe into the matching *.nsis.zip the
          # updater plugin expects. tauri-action's release path would
          # normally do this, but it's gated behind tagName.
          Get-ChildItem -Path $bundleRoot -Recurse -File -Filter *-setup.exe | ForEach-Object {
            $dest = $_.FullName -replace '\.exe$', '.nsis.zip'
            if (-not (Test-Path $dest)) {
              Write-Host "Packaging $($_.FullName) -> $dest"
              Compress-Archive -Path $_.FullName -DestinationPath $dest -Force
            }
          }

          $signed = 0
          Get-ChildItem -Path $bundleRoot -Recurse -File -Include *.nsis.zip | ForEach-Object {
            Write-Host "Signing $($_.FullName)"
            npx tauri signer sign $_.FullName
            if ($LASTEXITCODE -ne 0) { Write-Error "signing failed for $($_.FullName)"; exit 1 }
            $signed++
          }
          Write-Host "Signed $signed bundles"
          if ($signed -eq 0) {
            Get-ChildItem -Path $bundleRoot -Recurse -File | ForEach-Object { Write-Host $_.FullName }
            Write-Error "No updater bundles found to sign under $bundleRoot"
            exit 1
          }

      # Now upload everything: installers AND the freshly-signed updater
      # bundles + their .sig files. tauri-action didn't touch the release
      # (no tagName), so we own the upload entirely.
      - name: Upload all bundle artifacts (Unix)
        if: success() && matrix.platform != 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          BUNDLE_ROOT="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ ! -d "$BUNDLE_ROOT" ]; then
            echo "::error::Bundle dir $BUNDLE_ROOT not found"
            exit 1
          fi
          echo "Bundle dir tree:"
          ls -laR "$BUNDLE_ROOT" 2>&1 || true
          echo "--- upload phase ---"
          UPLOADED=0
          SIGS=0
          # Upload installers (.dmg .deb .AppImage), updater bundles
          # (.app.tar.gz .AppImage.tar.gz), and the matching .sig files.
          # Skip .rpm (we don't ship it).
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Uploading $f"
            if gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber; then
              UPLOADED=$((UPLOADED+1))
              case "$f" in *.sig) SIGS=$((SIGS+1)) ;; esac
            else
              echo "::warning::upload failed for $f"
            fi
          done < <(
            find "$BUNDLE_ROOT" -type f \( \
              -name "*.dmg" -o \
              -name "*.deb" -o \
              -name "*.AppImage" -o \
              -name "*.app.tar.gz" -o \
              -name "*.AppImage.tar.gz" -o \
              -name "*.sig" \
            \) 2>/dev/null
          )
          echo "Uploaded $UPLOADED files ($SIGS signatures)"
          if [ "$SIGS" -eq 0 ]; then
            echo "::error::No .sig files found — auto-update will be broken for this platform."
            exit 1
          fi

      - name: Upload all bundle artifacts (Windows)
        if: success() && matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          $bundleRoot = "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          if (-not (Test-Path $bundleRoot)) {
            Write-Error "Bundle dir $bundleRoot not found"
            exit 1
          }
          Write-Host "Bundle dir contents:"
          Get-ChildItem -Path $bundleRoot -Recurse -File | ForEach-Object { Write-Host $_.FullName }
          Write-Host "---"
          $uploaded = 0
          $sigs = 0
          Get-ChildItem -Path $bundleRoot -Recurse -File -Include *.exe, *.msi, *.nsis.zip, *.sig | ForEach-Object {
            Write-Host "Uploading $($_.FullName)"
            gh release upload $env:TAG $_.FullName --repo "${{ github.repository }}" --clobber
            if ($LASTEXITCODE -eq 0) {
              $uploaded++
              if ($_.Name -like '*.sig') { $sigs++ }
            } else {
              Write-Warning "upload failed for $($_.FullName)"
            }
          }
          Write-Host "Uploaded $uploaded files ($sigs signatures)"
          if ($sigs -eq 0) {
            Write-Error "No .sig files found — auto-update will be broken for this platform."
            exit 1
          }

  # Aggregator job: pull all .sig files from the release after the matrix
  # finishes, construct latest.json, upload it. Replaces tauri-action's
  # broken updater-json generation step.
  generate-updater-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Build + upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -e
          VERSION="${TAG#v}"
          mkdir -p sigs
          # `gh release download/upload` requires a repo reference; without
          # actions/checkout this job has no .git so we must pass --repo
          # explicitly. Previous runs failed with "fatal: not a git
          # repository".
          gh release download "$TAG" --repo "${{ github.repository }}" -p "*.sig" -D sigs/ --clobber || true
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Read signatures via Python so embedded special characters
          # don't break shell quoting. Missing platforms are silently
          # omitted from the manifest rather than crashing the JSON.
          export VERSION TAG PUB_DATE BASE_URL
          python3 - <<'PY' > latest.json
          import glob, json, os
          version = os.environ["VERSION"]
          base = os.environ["BASE_URL"]
          pub_date = os.environ["PUB_DATE"]

          def read_first(*patterns):
              for pat in patterns:
                  matches = glob.glob(f"sigs/{pat}")
                  if matches:
                      with open(matches[0]) as f:
                          return f.read().strip()
              return None

          # macOS Apple Silicon
          aarch64_sig = read_first("*aarch64*.app.tar.gz.sig", "ATO.app.tar.gz.sig")
          # macOS Intel (x86_64). Tauri may emit the same generic name
          # on both runners — fall back if no arch-tagged file.
          x64_sig = read_first("*x64*.app.tar.gz.sig", "*x86_64*.app.tar.gz.sig", "ATO.app.tar.gz.sig")
          linux_sig = read_first("*AppImage.tar.gz.sig", "*.AppImage.sig")
          win_sig = read_first("*nsis.zip.sig", "*msi.zip.sig")

          platforms = {}
          def add(key, sig, url):
              if sig:
                  platforms[key] = {"signature": sig, "url": url}

          add("darwin-aarch64", aarch64_sig, f"{base}/ATO_aarch64.app.tar.gz")
          add("darwin-x86_64",  x64_sig,     f"{base}/ATO_x64.app.tar.gz")
          add("linux-x86_64",   linux_sig,   f"{base}/ATO_{version}_amd64.AppImage.tar.gz")
          add("windows-x86_64", win_sig,     f"{base}/ATO_{version}_x64-setup.nsis.zip")

          print(json.dumps({
              "version": version,
              "notes": f"ATO {version}",
              "pub_date": pub_date,
              "platforms": platforms,
          }, indent=2))
          PY
          cat latest.json
          gh release upload "$TAG" latest.json --repo "${{ github.repository }}" --clobber

  # The cask repo lives at WillNigri/homebrew-ato, so the default GITHUB_TOKEN
  # (scoped to this repo) can't push there. Set HOMEBREW_TAP_TOKEN to a PAT
  # with `repo` scope on the tap repo to enable this step. Without that
  # secret the step is allowed to fail without breaking the release —
  # binaries + latest.json upload still succeed.
  update-homebrew:
    needs: build
    runs-on: macos-latest
    continue-on-error: true
    if: ${{ vars.PUBLISH_HOMEBREW != 'false' }}
    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Get SHA256 checksums
        id: sha
        env:
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          ARM_URL="https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/${TAG}/ATO_${VERSION}_aarch64.dmg"
          X64_URL="https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/${TAG}/ATO_${VERSION}_x64.dmg"
          echo "arm_sha=$(curl -sL "$ARM_URL" | shasum -a 256 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64_sha=$(curl -sL "$X64_URL" | shasum -a 256 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask
        env:
          # Use the tap PAT when present; fall back to the in-repo token (which
          # will fail with 403 against the tap, but that's caught below).
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ github.ref_name }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          X64_SHA: ${{ steps.sha.outputs.x64_sha }}
        run: |
          if ! git clone https://x-access-token:${GH_TOKEN}@github.com/WillNigri/homebrew-ato.git /tmp/homebrew-ato 2>/dev/null; then
            echo "::warning::Cannot push to homebrew-ato. Set HOMEBREW_TAP_TOKEN secret (PAT with repo scope) to enable cask updates."
            exit 0
          fi
          cat > /tmp/homebrew-ato/Casks/ato.rb << 'CASK'
          cask "ato" do
            version "VERSION_PLACEHOLDER"

            on_arm do
              sha256 "ARM_SHA_PLACEHOLDER"
              url "https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/TAG_PLACEHOLDER/ATO_#{version}_aarch64.dmg"
            end

            on_intel do
              sha256 "X64_SHA_PLACEHOLDER"
              url "https://github.com/WillNigri/Agentic-Tool-Optimization/releases/download/TAG_PLACEHOLDER/ATO_#{version}_x64.dmg"
            end

            name "ATO"
            desc "Control panel for AI coding tools — manage skills, agents, and LLM configurations"
            homepage "https://agentictool.ai"

            app "ATO.app"

            zap trash: [
              "~/.ato",
              "~/Library/Application Support/ai.agenticsearchoptimization.ato",
              "~/Library/Caches/ai.agenticsearchoptimization.ato",
            ]
          end
          CASK
          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/g" /tmp/homebrew-ato/Casks/ato.rb
          sed -i '' "s/TAG_PLACEHOLDER/${TAG}/g" /tmp/homebrew-ato/Casks/ato.rb
          sed -i '' "s/ARM_SHA_PLACEHOLDER/${ARM_SHA}/g" /tmp/homebrew-ato/Casks/ato.rb
          sed -i '' "s/X64_SHA_PLACEHOLDER/${X64_SHA}/g" /tmp/homebrew-ato/Casks/ato.rb
          cd /tmp/homebrew-ato
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ato.rb
          git commit -m "chore: bump ATO to ${TAG}"
          git push
